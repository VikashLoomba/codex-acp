# Fork release automation: merge to main with green CI -> version bump -> tag ->
# GitHub release -> chain-dispatch the OIDC publish. No secrets, no manual steps.
#
# TRIGGERS
#   - workflow_run on CI: fires when the CI workflow completes for a push to
#     main; releases only when CI was green. This is the merge-to-main path.
#   - workflow_dispatch: manual releases (explicit bump override, dry runs).
#
# BUMP SIZE is inferred from the commit subjects since the last v* tag:
#   a conventional '!' marker or 'BREAKING CHANGE' -> major; 'feat:' -> minor;
#   anything else -> patch. Commits whose subject contains '[skip release]' are
#   ignored; if only skipped commits landed, no release happens.
#
# Upstream's chain (Version Bump -> tag -> Release) needs a GitHub App token and
# e2e credentials this repo does not carry, so those workflows stay disabled;
# this workflow is the fork's release path. npm's trusted publisher for
# @automatalabs/codex-acp points at publish-oidc.yml specifically, so this
# workflow never publishes itself — it dispatches that workflow. Everything here
# is recursion-safe: the bump commit + tag are pushed with GITHUB_TOKEN, which
# triggers no workflows (so no CI -> no workflow_run loop), while the explicit
# workflow_dispatch of publish-oidc.yml is the documented recursion-guard
# exception, so the publish leg still fires.
name: Release (fork)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'semver bump (auto = infer from commit subjects since the last tag)'
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      dry_run:
        description: 'compute the release decision and stop (no push, no release, no publish)'
        type: boolean
        default: false

permissions:
  contents: write # push the bump commit + tag, create the GitHub release
  actions: write # dispatch publish-oidc.yml

concurrency:
  group: release-fork
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Decide the bump (commit subjects since the last v* tag)
        id: decide
        env:
          BUMP_INPUT: ${{ inputs.bump }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"
          SUBJECTS=$(git log "$RANGE" --format=%s | grep -vF '[skip release]' || true)
          if [ -z "$SUBJECTS" ]; then
            echo "No releasable commits since ${LAST_TAG:-the first commit} — nothing to do." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "bump=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BUMP="${BUMP_INPUT:-auto}"
          if [ "$BUMP" = "auto" ]; then
            if echo "$SUBJECTS" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE'; then BUMP=major
            elif echo "$SUBJECTS" | grep -qE '^feat(\([^)]*\))?:'; then BUMP=minor
            else BUMP=patch
            fi
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          { echo "Releasing a **$BUMP** bump over ${LAST_TAG:-nothing} for:"; echo "$SUBJECTS" | sed 's/^/- /'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry run — stop before the bump
        if: steps.decide.outputs.bump != '' && inputs.dry_run
        run: echo "DRY RUN — would bump '${{ steps.decide.outputs.bump }}', push the commit + tag, create the GitHub release, and dispatch Publish (OIDC)."

      - name: Configure git
        if: steps.decide.outputs.bump != '' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # No install needed: package.json has no version-lifecycle scripts, and
      # the build happens in publish-oidc.yml via prepublishOnly.
      - name: Bump version
        if: steps.decide.outputs.bump != '' && !inputs.dry_run
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ steps.decide.outputs.bump }} -m "Release v%s")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Push commit and tag
        if: steps.decide.outputs.bump != '' && !inputs.dry_run
        run: git push --follow-tags origin main

      - name: Create GitHub release
        if: steps.decide.outputs.bump != '' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.bump.outputs.version }}" --generate-notes

      - name: Dispatch Publish (OIDC)
        if: steps.decide.outputs.bump != '' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-oidc.yml --ref main
