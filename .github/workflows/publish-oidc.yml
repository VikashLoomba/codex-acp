# Token-less publish of @automatalabs/codex-acp to npm via OIDC trusted publishing.
#
# No NPM token: with `id-token: write` and a trusted publisher configured for
# @automatalabs/codex-acp on npmjs.com (pointing at this repo + this workflow
# file), npm (>= 11.5.1, bundled with Node 24) exchanges the GitHub OIDC token
# for a short-lived publish credential automatically. `--provenance` attaches a
# build attestation (this repo is public).
#
# Manual trigger only. `prepublishOnly` (npm run build) rebuilds dist before publish.
name: Publish (OIDC)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish (OIDC, provenance)
        run: npm publish --access public --provenance
